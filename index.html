<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>С 8 Марта!</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        overflow: hidden;
        background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        font-family: 'Segoe UI', Arial, sans-serif;
        height: 100vh;
        width: 100vw;
        position: relative;
    }
    
    /* Контейнер для анимаций */
    #animation-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }
    
    /* Круги для фона */
    .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        animation: float 20s infinite ease-in-out;
    }
    
    .circle1 {
        width: 300px;
        height: 300px;
        top: -100px;
        left: -100px;
        background: radial-gradient(circle, rgba(255,182,193,0.4) 0%, rgba(255,105,180,0.1) 100%);
        animation-delay: 0s;
    }
    
    .circle2 {
        width: 500px;
        height: 500px;
        bottom: -200px;
        right: -200px;
        background: radial-gradient(circle, rgba(255,192,203,0.3) 0%, rgba(255,20,147,0.1) 100%);
        animation-delay: -5s;
    }
    
    .circle3 {
        width: 200px;
        height: 200px;
        top: 50%;
        left: 30%;
        background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(255,228,225,0.2) 100%);
        animation-delay: -10s;
    }
    
    @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-50px) scale(1.1); }
    }
    
    /* Основной контент */
    #content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        color: white;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    
    /* Сообщение с поздравлением */
    #greeting {
        text-align: center;
        opacity: 0;
        transition: opacity 2s ease-in-out;
        margin-bottom: 30px;
    }
    
    #greeting h1 {
        font-size: 72px;
        margin-bottom: 20px;
        color: #fff;
        text-shadow: 0 0 20px rgba(255,255,255,0.5);
        animation: glow 3s infinite alternate;
    }
    
    @keyframes glow {
        from { text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        to { text-shadow: 0 0 40px rgba(255,255,255,0.8), 0 0 60px rgba(255,105,180,0.5); }
    }
    
    #greeting p {
        font-size: 28px;
        opacity: 0.9;
    }
    
    /* Конфетти */
    .confetti {
        position: absolute;
        width: 10px;
        height: 20px;
        background: #ff6b6b;
        opacity: 0;
        animation: confetti-fall 5s linear infinite;
    }
    
    @keyframes confetti-fall {
        0% {
            transform: translateY(-100vh) rotate(0deg);
            opacity: 1;
        }
        100% {
            transform: translateY(100vh) rotate(720deg);
            opacity: 0;
        }
    }
    
    /* Цветочки */
    .flower {
        position: absolute;
        font-size: 24px;
        opacity: 0;
        animation: flower-float 10s linear infinite;
        pointer-events: none;
    }
    
    @keyframes flower-float {
        0% {
            transform: translateY(100vh) rotate(0deg);
            opacity: 0;
        }
        10% {
            opacity: 0.8;
        }
        90% {
            opacity: 0.8;
        }
        100% {
            transform: translateY(-100vh) rotate(360deg);
            opacity: 0;
        }
    }
    
    /* Кнопка для повторного поздравления */
    #celebrate-btn {
        background: rgba(255,255,255,0.2);
        border: 2px solid white;
        color: white;
        font-size: 18px;
        padding: 12px 30px;
        border-radius: 50px;
        cursor: pointer;
        backdrop-filter: blur(5px);
        transition: all 0.3s ease;
        margin-top: 30px;
        opacity: 0;
        transition: opacity 2s ease-in-out, background 0.3s ease;
        border: none;
        background: rgba(255, 105, 180, 0.3);
    }
    
    #celebrate-btn:hover {
        background: rgba(255, 105, 180, 0.5);
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(255,105,180,0.5);
    }
    
    /* Сердечки */
    .heart {
        position: absolute;
        color: rgba(255, 0, 128, 0.6);
        font-size: 20px;
        pointer-events: none;
        animation: heart-float 4s ease-out forwards;
    }
    
    @keyframes heart-float {
        0% {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        100% {
            transform: translateY(-200px) scale(1.5);
            opacity: 0;
        }
    }
    
    /* Статистика */
    #stats {
        position: absolute;
        bottom: 20px;
        right: 20px;
        color: rgba(255,255,255,0.5);
        font-size: 14px;
        z-index: 100;
    }
</style>
</head>
<body>
    <div id="animation-container">
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
    </div>
    
    <div id="content">
        <div id="greeting">
            <h1>🌸 С 8 Марта! 🌸</h1>
            <p>Пусть каждый день будет прекрасным, как весна!</p>
        </div>
    </div>
    
    <div id="stats"></div>

    <script>
        // Функция для создания конфетти
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                
                // Случайные цвета
                const colors = ['#ff6b6b', '#feca57', '#ff9ff3', '#54a0ff', '#5f27cd', '#ff99cc', '#ff66aa'];
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                // Случайные размеры
                confetti.style.width = Math.random() * 15 + 5 + 'px';
                confetti.style.height = Math.random() * 25 + 10 + 'px';
                
                // Случайная позиция
                confetti.style.left = Math.random() * 100 + '%';
                
                // Случайная задержка анимации
                confetti.style.animationDelay = Math.random() * 5 + 's';
                
                document.body.appendChild(confetti);
                
                // Удаляем через 10 секунд
                setTimeout(() => {
                    confetti.remove();
                }, 10000);
            }
        }
        
        // Функция для создания цветочков
        function createFlowers() {
            const flowers = ['🌸', '🌼', '🌺', '🌷', '🌹', '💐', '🌸', '🌻'];
            
            for (let i = 0; i < 20; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                
                // Случайная позиция
                flower.style.left = Math.random() * 100 + '%';
                flower.style.fontSize = Math.random() * 30 + 20 + 'px';
                
                // Случайная задержка анимации
                flower.style.animationDelay = Math.random() * 10 + 's';
                
                // Случайная длительность анимации
                flower.style.animationDuration = Math.random() * 10 + 10 + 's';
                
                document.body.appendChild(flower);
                
                // Удаляем через 20 секунд
                setTimeout(() => {
                    flower.remove();
                }, 20000);
            }
        }
        
        // Функция для создания сердечек
        function createHearts() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤️';
                    
                    // Случайная позиция
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.bottom = '0';
                    
                    // Случайный размер
                    heart.style.fontSize = Math.random() * 30 + 20 + 'px';
                    
                    document.body.appendChild(heart);
                    
                    // Удаляем через 4 секунды
                    setTimeout(() => {
                        heart.remove();
                    }, 4000);
                }, i * 100);
            }
        }
        
        // Функция для показа поздравления
        function showGreeting() {
            const greeting = document.getElementById('greeting');
            const btn = document.getElementById('celebrate-btn');
            
            greeting.style.opacity = '1';
            btn.style.opacity = '1';
            
            // Запускаем анимации
            createConfetti();
            createFlowers();
            
            // Обновляем статистику
            updateStats();
        }
        
        // Функция для повторного празднования
        function celebrateAgain() {
            createConfetti();
            createFlowers();
            createHearts();
            
            // Анимация заголовка
            const h1 = document.querySelector('#greeting h1');
            h1.style.transform = 'scale(1.2)';
            setTimeout(() => {
                h1.style.transform = 'scale(1)';
            }, 500);
            
            updateStats();
        }
        
        // Счетчик поздравлений
        let celebrationCount = 0;
        
        function updateStats() {
            celebrationCount++;
            const stats = document.getElementById('stats');
            stats.innerHTML = `🎉 Поздравлений: ${celebrationCount} | 🌸 8 Марта ${new Date().getFullYear()}`;
        }
        
        // Показываем поздравление через 2 секунды после загрузки страницы
        setTimeout(showGreeting, 2000);
        
        // Добавляем случайные сердечки при движении мыши
        document.addEventListener('mousemove', function(e) {
            if (Math.random() > 0.9) { // 10% шанс при движении
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = e.clientX + 'px';
                heart.style.top = e.clientY + 'px';
                heart.style.fontSize = Math.random() * 20 + 10 + 'px';
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 2000);
            }
        });
        
        // Инициализация при загрузке
        window.onload = function() {
            // Создаем фоновые цветочки
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower';
                    flower.innerHTML = '🌸';
                    flower.style.left = Math.random() * 100 + '%';
                    flower.style.fontSize = Math.random() * 40 + 20 + 'px';
                    flower.style.animationDelay = '0s';
                    flower.style.animationDuration = Math.random() * 10 + 15 + 's';
                    document.body.appendChild(flower);
                }, i * 1000);
            }
        };
    </script>
</body>
</html>
